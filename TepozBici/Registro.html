<!-- ================= REGISTRO.HTML ================= -->
<!DOCTYPE html>
<html lang="es">
<head>

    <!-- Esto ayuda a que la página use letras y símbolos correctamente -->
    <meta charset="UTF-8">

    <!-- Esto hace que se vea bien en celular -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Nombre que aparece en la pestaña -->
    <title>Registro</title>

    <!-- Aquí conectamos tu CSS (los estilos bonitos) -->
    <link rel="stylesheet" href="css/registro.css">

    <!-- Bootstrap (ayuda con estilos como botones y cajas) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- Esta es la capa oscura del fondo -->
<div class="overlay">

    <!-- LADO IZQUIERDO (texto bonito) -->
    <div class="left">
        <h1>Crear Cuenta</h1>
        <p>Llena tus datos.</p>
    </div>

    <!-- LADO DERECHO (FORMULARIO) -->
    <div class="right">

        <h3>Registro</h3>

        <!-- FORMULARIO -->
        <form>

            <!-- ================= DATOS PERSONALES ================= -->

            <!-- Caja para escribir el nombre -->
            <input id="nombre" class="form-control mb-2" placeholder="Nombre">

            <!-- Caja para apellidos -->
            <input id="apellidos" class="form-control mb-2" placeholder="Apellidos">

            <!-- Caja para teléfono -->
            <input id="telefono" class="form-control mb-2" placeholder="Teléfono">

            <!-- Caja para dirección -->
            <input id="direccion" class="form-control mb-2" placeholder="Dirección">

            <!-- Caja para correo -->
            <input id="correo" type="email" class="form-control mb-2" placeholder="Correo">


            <!-- ================= CONTRASEÑAS ================= -->

            <!-- Aquí escribes tu contraseña -->
            <input id="password" type="password" class="form-control mb-2" placeholder="Contraseña">

            <!-- Aquí confirmas la contraseña -->
            <input id="password2" type="password" class="form-control mb-2" placeholder="Validar contraseña">


            <!-- ================= ADMIN ================= -->

            <!-- Casilla para saber si es administrador -->
            <div class="form-check mb-2">
                <input type="checkbox" id="adminCheck" onclick="mostrarLlave()">
                <label>¿Eres administrador?</label>
            </div>


            <!-- ================= LLAVE SECRETA ================= -->

            <!-- Esta parte está escondida al inicio -->
            <div id="llaveBox" style="display:none;">

                <!-- Aquí se escribe la llave de admin -->
                <input id="llave" class="form-control mb-2" placeholder="Llave de 6 dígitos">

            </div>


            <!-- ================= BOTÓN ================= -->

            <!-- Botón para registrarse -->
            <button type="button" onclick="registrar()" class="btn btn-custom w-100">
                Registrarse
            </button>

        </form>


        <!-- ================= VOLVER ================= -->

        <!-- Botón para regresar al login -->
        <div class="mt-3 text-center">
            <a href="login.html" class="btn btn-outline-light w-100">Volver</a>
        </div>

    </div>

</div>


<!-- ================= SCRIPT ================= -->

<!-- Este script muestra u oculta la llave -->
<script>

function mostrarLlave(){

    // Buscamos el checkbox
    let check = document.getElementById("adminCheck");

    // Buscamos la caja de la llave
    let caja = document.getElementById("llaveBox");

    // Si está activado mostramos la caja
    if(check.checked){
        caja.style.display = "block";
    } else {
        caja.style.display = "none";
    }

}

</script>

    <div id="toast" class="toast"></div>
    
<!-- ================= FIREBASE ================= -->

<!-- Aquí conectamos Firebase -->
<script type="module" src="firebase.js"></script>

<!-- Aquí está la lógica de registro/login -->
<script type="module" src="auth.js"></script>


</body>
</html>
