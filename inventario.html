<!-- ================= INVENTARIO.HTML ================= -->
<!DOCTYPE html>
<html lang="es">
<head>

    <!-- Configuración básica -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/inventario.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

    <!-- ================= BOTÓN VOLVER ================= -->
    <a href="menu.html" class="btn-volver">Volver al menú</a>


    <!-- ================= CARRITO ================= -->
    <div class="carrito" id="carrito" onclick="irCarrito()">🛒</div>


    <!-- ================= BOTÓN AGREGAR ================= -->
    <a href="bicicleta.html" id="btnAgregar" class="btn-agregar">
        Agregar Bicicleta
    </a>


    <!-- ================= CONTENEDOR DE BICICLETAS ================= -->
    <div id="contenedor-bicis" class="contenedor"></div>


    <!-- ================= TEMPLATE ================= -->
    <!-- Esta plantilla se clona desde JS -->
    <template id="template-bici">

        <div class="card-bici">

            <!-- Imagen -->
            <img class="img-bici">

            <!-- Información -->
            <h4 class="nombre"></h4>
            <p class="marca"></p>
            <p class="tipo"></p>
            <p class="precio"></p>
            <p class="descripcion"></p>
            <p class="estado"></p>

            <!-- Botones -->
            <div class="acciones"></div>

        </div>

    </template>


    <!-- ================= MODAL EDITAR ================= -->
    <div id="modalEditar" class="modal-editar">

        <div class="modal-box">

            <h3>Editar Bicicleta</h3>

            <input id="editNombre" placeholder="Nombre">
            <input id="editMarca" placeholder="Marca">
            <input id="editTipo" placeholder="Tipo">
            <input id="editPrecio" placeholder="Precio">
            <input id="editImagen" placeholder="Imagen (ej: bici1.jpg)">
            <textarea id="editDescripcion" placeholder="Descripción"></textarea>

            <button onclick="guardarCambios()" class="btn-pro">Guardar</button>
            <button onclick="cerrarModal()" class="btn-pro">Cancelar</button>

        </div>

    </div>


    <!-- ================= MENSAJE BONITO ================= -->
    <div id="toast" class="toast"></div>


    <!-- ================= JS ================= -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="inventario.js"></script>

</body>
</html>
