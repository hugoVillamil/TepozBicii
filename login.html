<!--  ================= login.HTML ================= -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<!-- Conectamos el archivo CSS externo -->
<link rel="stylesheet" href="css/login.css">

<!-- Bootstrap para ayudarnos con estilos básicos -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
<div id="toast" class="toast"></div>
<!-- Capa oscura sirve para que el texto se vea mejor sobre la imagen -->
<div class="overlay">

    <!-- LADO IZQUIERDO (Texto bonito) -->
    <div class="left">
        <h1>TepozBici</h1>
        <p>
            Inicia sesión para continuar
        </p>
    </div>

    <!-- LADO DERECHO (Formulario de login) -->
    <div class="right">
        <h3 class="mb-4">Iniciar Sesion</h3>
        
        <!-- FORMULARIO iniciar sesion -->
        <form>

            <!-- Campo de correo -->
            <div class="mb-3">
                <input id="correo" class="form-control" placeholder="Correo">
            </div>

            <!-- Campo de contraseña -->
            <div class="mb-3">
                <input id="password" type="password" class="form-control" placeholder="Contraseña">
            </div>

            <!-- Casilla de recordar usuario -->
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input">
                <label class="form-check-label">Recordar</label>
            </div>

            <!-- Botón de iniciar sesión -->
            <button type="button" onclick="login()" class="btn btn-outline-light w-100">Iniciar sesión</button>
        
        </form>
        <!-- BOTON PARA A IR A REGISTRO -->
        <div class="mt-3 text-center">
            <a href="registro.html" class="btn btn-outline-light w-100"> Registro</a>
        </div>
        <!-- Links pequeños debajo -->
        <div class="mt-3 links">
            <p><a href="#">Olvidaste tu contraseña?</a></p>
            <p>
                Al iniciar sesión aceptas:<br>
                <a href="#">Terms of Service</a> | <a href="#">Privacy Policy</a>
            </p>
        </div>
        <script type="module" src="firebase.js"></script>
        <script type="module" src="auth.js"></script>
    </div>
</div>

</body>
</html>
