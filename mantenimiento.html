<!-- ================= MANTENIMIENTO.HTML ================= -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Mantenimiento</title>

<!-- CSS separado -->
<link rel="stylesheet" href="css/mantenimiento.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- BOTÓN PARA REGRESAR AL MENÚ -->
<!-- Este botón te lleva otra vez al panel principal -->
<a href="menu.html" class="btn-volver"> Volver al menú</a>

<!-- CONTENEDOR PRINCIPAL -->
<div class="contenedor">

    <!-- TÍTULO -->
    <h2>Registrar Mantenimiento</h2>

    <!-- FORMULARIO -->
    <form>

        <!-- FECHA -->
        <label>Fecha:</label>
        <input type="date" class="form-control mb-2">


        <!-- TIPO -->
        <label>Tipo de mantenimiento:</label>
        <select class="form-control mb-2">
            <option>Preventivo</option>
            <option>Correctivo</option>
        </select>

        <!-- DESCRIPCIÓN -->
        <label>Descripción del problema:</label>
        <textarea class="form-control mb-2"></textarea>


        <!-- ID BICI -->
        <label>ID de la bicicleta:</label>
        <input type="number" class="form-control mb-2">


        <!-- REPARACIÓN -->
        <label>¿Se pudo corregir?</label>
        <select class="form-control mb-2">
            <option>Sí</option>
            <option>No</option>
        </select>


        <!-- ID EMPLEADO -->
        <label>ID del empleado:</label>
        <input type="number" class="form-control mb-2">


        <!-- REFACCIONES -->
        <label>Refacciones utilizadas:</label>
        <textarea class="form-control mb-3" placeholder="Ej: frenos, cadena"></textarea>
        
        <!-- IMPORTAMOS LOS JS -->
        <script type="module" src="firebase.js"></script>
        <script type="module" src="mantenimiento.js"></script>

        <!-- BOTÓN GUARDAR -->
        <button type="button" onclick="guardarMantenimiento()">Guardar</button>

    </form>

</div>
<!-- ================= MENSAJE BONITO ================= -->
<div id="toast" class="toast"></div>
</body>
</html>
